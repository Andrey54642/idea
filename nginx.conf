server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    error_page 404 /404.html;
}
